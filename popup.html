<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sticky Notes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Sticky Notes</h1>
        <p id="site-label">Loading…</p>
      </div>
      <button id="add-btn" aria-label="Add new sticky note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Note
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off">
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <span class="dot"></span>
      <span id="stats-text">0 notes on this page</span>
    </div>

    <!-- Notes list -->
    <div id="notes-list"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📝</div>
      <p>No notes on this page yet.</p>
      <span>Click "Add Note" to get started.</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
